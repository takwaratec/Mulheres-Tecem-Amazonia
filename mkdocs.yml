site_name: "Mulheres Que Tecem a Floresta - MQTF"
site_url: "https://takwaratec.github.io/Mulheres-Tecem-Amazonia/"
repo_url: "https://github.com/takwaratec/Mulheres-Tecem-Amazonia"
edit_uri: ""

# --- ADICIONE ESTAS LINHAS ---
use_directory_urls: false
strict: false # Permite que o deploy continue mesmo se houver avisos de links
remote_branch: gh-pages # Define a branch de destino do deploy
remote_name: origin

theme:
  name: material
  custom_dir: docs/overrides
  language: pt-BR
  logo: assets/logo_BQTF/logo_mqtf_soberana.svg
  favicon: assets/logo_BQTF/logo_mqtf_soberana.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

copyright: "Mulheres Que Tecem a Floresta - MQTF | Consórcio Científico - UnB/UFFR/UFAC"

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - pymdownx.arithmatex
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

