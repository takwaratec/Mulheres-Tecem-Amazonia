site_name: "Mulheres Que Tecem a Floresta - MQTF"
site_url: "https://takwaratec.github.io/Mulheres-Tecem-Amazonia/"
repo_url: "https://github.com/takwaratec/Mulheres-Tecem-Amazonia"
edit_uri: ""

# --- ADICIONE ESTAS LINHAS ---
use_directory_urls: false
strict: false # Permite que o deploy continue mesmo se houver avisos de links
remote_branch: gh-pages # Define a branch de destino do deploy
remote_name: origin

theme:
  name: material
  custom_dir: docs/overrides
  language: pt-BR
  logo: assets/logo_BQTF/logo_mqtf_soberana.svg
  favicon: assets/logo_BQTF/logo_mqtf_soberana.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: black
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

copyright: "Mulheres Que Tecem a Floresta - MQTF | Consórcio Científico UnB/UFFR/UFAC | Licença: CC BY 4.0 (Difusão) & Sigilo Institutional (Soberania de Dados)"

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - pymdownx.arithmatex
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Portal Institucional: index.md
  - Dossiê de Soberania (BNDES):
      - Resumo Executivo (v3.0): 01_GOVERNANCA/GOV01_RES_EXECUTIVO_WTF.md
      - Orçamento Consolidado (R$ 30M): 01_GOVERNANCA/05_ANEXOS/ANEXO_I_PLANILHA_ORCAMENTARIA.md
      - Pacto de Intenções (Base Jurídica): 01_GOVERNANCA/05_ANEXOS/ANEXO_III_PROTOCOLO_INTENCOES.md
      - Sigilo e Confidencialidade: 01_GOVERNANCA/04_PARECERES_E_RELATORIOS/NT-GOV-001_SIGILO-E-CONFIDENCIALIDADE.md
  - Engenharia Soberana (T01-T12):
      - Inventário Mecânico BNDES: 04_GESTAO_OPERACIONAL/01_FLUXO_TECNICO/INVENCOES/ENG-MEM-010_INVENTARIO-MECANICO-BNDES.md
      - Inventário Único de Patentes: 04_GESTAO_OPERACIONAL/01_FLUXO_TECNICO/INVENCOES/ENG_memorial-unico-patentes.md
      - Balsa-Catamarã Naval T10: 04_GESTAO_OPERACIONAL/01_FLUXO_TECNICO/INVENCOES/T10_BALSA_CATAMARA/ENG-MEM-T10_BALSA-CATAMARA-VAPOR.md
      - Monitoramento SMGA: 01_GOVERNANCA/05_ANEXOS/ANEXO_IV_TR_MRV_SMGA.md
  - Camada Científica & Estudos:
      - Síntese do Ecossistema: 02_DIAGNOSTICO DE AREA/02_ESTUDOS_E_PESQUISAS/RES_sintese-cientifica-ecossistema-WTF.md
      - Luminância Científica MQTF: 02_DIAGNOSTICO DE AREA/02_ESTUDOS_E_PESQUISAS/01_RESENHAS_CIENTIFICAS_FEMININAS/LUMINANCIA_CIENTIFICA_MQTF.md
      - Paradigmas Bioeconomia: 02_DIAGNOSTICO DE AREA/WTF-DIAG-002_PARADIGMAS_BIOECONOMIA_AMAZONICA.md
  - Prospecções & Editais 2026:
      - Parecer Estratégico 2026: 04_GESTAO_OPERACIONAL/03_EDITAIS_2026/PARECER_ACAO_EDITAIS_2026.md
      - Zayed Sustain. Prize: 04_GESTAO_OPERACIONAL/03_EDITAIS_2026/EDT-011-ZAYED-PRIZE.md
      - Nature Awards in Sci: 04_GESTAO_OPERACIONAL/03_EDITAIS_2026/EDT-010-NATURE-AWARDS.md
      - CONAB Amazônia Viva: 04_GESTAO_OPERACIONAL/03_EDITAIS_2026/EDT-003-CONAB-AMAZONIAVIVA.md
  - Governança & Equipe:
      - Projeto Integrado: 01_GOVERNANCA/WTF_PROJETO_INTEGRADO.md
      - Equipe Consórcio: 01_GOVERNANCA/01_COLABORADORES/00_EQUIPE_CONSORCIO.md
      - Resumo Financeiro Consolidado: 03_ORCAMENTO_E_LOGISTICA/RESUMO_FINANCEIRO_CONSOLIDADO.md
      - Hub de Inventário: 01_GOVERNANCA/00_repository_governance_inventory.md



