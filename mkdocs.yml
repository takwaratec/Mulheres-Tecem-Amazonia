site_name: "Mulheres Que Tecem a Floresta - MQTF"
site_url: "https://takwaratec.github.io/Mulheres-Tecem-Amazonia/"
repo_url: "https://github.com/takwaratec/Mulheres-Tecem-Amazonia"
edit_uri: ""

theme:
  name: material
  custom_dir: docs/overrides
  language: pt-BR
  logo: assets/patterns/square_06_red.svg
  favicon: assets/patterns/square_06_red.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: red
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

copyright: "Mulheres Que Tecem a Floresta - MQTF | Consórcio Científico - UnB/UFFR/UFAC"

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - pymdownx.arithmatex
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Hub Científico: index.md
  - Projeto Integrado: 01_GOVERNANCA/WTF_PROJETO_INTEGRADO.md
  - Alinhamento BNDES: 01_GOVERNANCA/WTF-ALINHAMENTO_ESTRATEGICO.md
  - Dossiê BNDES:
      - Resumo Executivo: 03_DOSSIE_BNDES/00_RESUMO_EXECUTIVO.md
      - Cadeias de Valor: 03_DOSSIE_BNDES/01_CADEIAS_VALOR.md
      - Biorrefinaria & Bioconstrução: 03_DOSSIE_BNDES/02_BIORREFINARIA_BIOCONSTRUCAO.md
      - Artesanato & Saberes: 03_DOSSIE_BNDES/03_ARTESANATO_SABERES.md
      - Governança Operacional: 03_DOSSIE_BNDES/04_GOVERNANCA_OPERACIONAL.md
  - Anexos:
      - Planejamento Financeiro: 01_GOVERNANCA/05_ANEXOS/ANEXO_I_PLANILHA_ORCAMENTARIA.md
      - Monitoramento SGMAS: 01_GOVERNANCA/05_ANEXOS/ANEXO_IV_TR_MRV_SMGA.md
  - Referências: bibliografia.md
  - Acervo Científico:
      - Índice do Acervo: 04_PESQUISA_ANDAMENTO/ACERVO_DIGITAL_WTF/03_METADATA_CATALOG/WTF_INDEX_ACERVO.md
      - Teste Taxonomia: 04_PESQUISA_ANDAMENTO/teste_taxonomia.md
  - Engenharia & Gestão:
      - Leitura Global: 04_GESTAO_OPERACIONAL/01_FLUXO_TECNICO/INVENCOES/AUDITORIA_E_GERAL/WTF_LEITURA-GLOBAL-PROJETO.md
      - Coração Térmico: 04_GESTAO_OPERACIONAL/01_FLUXO_TECNICO/ENG-MEM-MASTER_CORACAO-TERMICO.md

extra:
  return_to_dashboard: "../../index.html"
